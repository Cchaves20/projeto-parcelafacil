<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - ParcelaFácil</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <div class="month-selector">
          <select id="month-select"></select>
          <select id="year-select"></select>
        </div>
      </div>

      <p id="exchange-rate-note" class="exchange-rate-note"></p>

      <div class="summary-grid" id="summary-grid"></div>

      <div class="card">
        <h2>Comprometimento da renda</h2>
        <canvas id="dashboard-chart" height="120"></canvas>
      </div>

      <div class="card">
        <h2>Minha renda</h2>
        <form id="income-form" class="inline-form">
          <div class="form-field form-field-grow">
            <label for="income-description">Descrição</label>
            <input type="text" id="income-description" placeholder="Ex: Salário" />
          </div>
          <div class="form-field">
            <label for="income-amount">Valor</label>
            <input type="number" id="income-amount" step="0.01" min="0" required />
          </div>
          <div class="form-field">
            <label for="income-currency">Moeda</label>
            <select id="income-currency">
              <option value="BRL">BRL</option>
              <option value="USD">USD</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Adicionar</button>
        </form>
        <p id="income-error" class="form-error hidden"></p>

        <table class="data-table">
          <thead>
            <tr>
              <th>Descrição</th>
              <th>Valor</th>
              <th>Moeda</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="income-table-body"></tbody>
        </table>
        <p id="income-empty" class="empty-state hidden">Nenhuma renda cadastrada ainda.</p>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/charts.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
