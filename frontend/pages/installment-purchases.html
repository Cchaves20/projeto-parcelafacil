<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compras parceladas - ParcelaFácil</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/tables.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Compras parceladas</h1>
      </div>

      <div class="card">
        <form id="purchase-form" class="inline-form">
          <div class="form-field form-field-grow">
            <label for="purchase-description">Descrição</label>
            <input type="text" id="purchase-description" placeholder="Ex: Notebook" required />
          </div>
          <div class="form-field">
            <label for="purchase-total">Valor total</label>
            <input type="number" id="purchase-total" step="0.01" min="0" required />
          </div>
          <div class="form-field">
            <label for="purchase-currency">Moeda</label>
            <select id="purchase-currency">
              <option value="BRL">BRL</option>
              <option value="USD">USD</option>
            </select>
          </div>
          <div class="form-field">
            <label for="purchase-category">Categoria</label>
            <select id="purchase-category">
              <option value="">Nenhuma</option>
            </select>
          </div>
          <div class="form-field">
            <label for="purchase-installments">Parcelas</label>
            <input type="number" id="purchase-installments" min="1" required />
          </div>
          <div class="form-field">
            <label for="purchase-first-due">1ª parcela</label>
            <input type="date" id="purchase-first-due" required />
          </div>
          <button type="submit" class="btn btn-primary">Adicionar</button>
        </form>
        <p id="purchase-error" class="form-error hidden"></p>
      </div>

      <div id="purchase-list"></div>
      <p id="purchase-empty" class="empty-state hidden">Nenhuma compra parcelada cadastrada ainda.</p>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/installment-purchases.js"></script>
</body>
</html>
