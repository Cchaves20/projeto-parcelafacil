<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorias - ParcelaFácil</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/tables.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Categorias</h1>
      </div>

      <div class="card">
        <form id="category-form" class="inline-form">
          <div class="form-field form-field-grow">
            <label for="category-name">Nome da categoria</label>
            <input type="text" id="category-name" placeholder="Ex: Lazer" required />
          </div>
          <button type="submit" class="btn btn-primary">Adicionar</button>
        </form>
        <p id="category-error" class="form-error hidden"></p>

        <table class="data-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="category-table-body"></tbody>
        </table>
        <p id="category-empty" class="empty-state hidden">Nenhuma categoria cadastrada ainda.</p>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/categories.js"></script>
</body>
</html>
