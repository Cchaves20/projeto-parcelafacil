<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar - ParcelaFácil</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>ParcelaFácil</h1>
    <p class="auth-subtitle">Controle suas finanças em BRL e USD</p>

    <form id="login-form" class="auth-form">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required autocomplete="email" />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <p id="login-error" class="form-error hidden"></p>

      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <p class="auth-footer">Não tem conta? <a href="register.html">Cadastre-se</a></p>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
