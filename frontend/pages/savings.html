<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caixinhas - ParcelaFácil</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <link rel="stylesheet" href="../css/tables.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Caixinhas</h1>
      </div>

      <div class="card">
        <h2>Nova caixinha</h2>
        <form id="box-form" class="inline-form">
          <div class="form-field form-field-grow">
            <label for="box-name">Nome</label>
            <input type="text" id="box-name" placeholder="Ex: Reserva de emergência" required />
          </div>
          <div class="form-field">
            <label for="box-currency">Moeda</label>
            <select id="box-currency">
              <option value="BRL">BRL</option>
              <option value="USD">USD</option>
            </select>
          </div>
          <div class="form-field">
            <label for="box-rate">Rendimento anual (%)</label>
            <input type="number" id="box-rate" step="0.01" min="0" value="0" required />
          </div>
          <button type="submit" id="box-submit-btn" class="btn btn-primary">Criar caixinha</button>
          <button type="button" id="box-cancel-edit-btn" class="btn hidden">Cancelar</button>
        </form>
        <p id="box-error" class="form-error hidden"></p>
      </div>

      <div id="box-list"></div>
      <p id="box-empty" class="empty-state hidden">Nenhuma caixinha cadastrada ainda.</p>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/savings.js"></script>
</body>
</html>
